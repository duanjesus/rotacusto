spring:
  application:
    name: rotacusto-backend
  datasource:
    url: jdbc:h2:mem:rotacusto;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  h2:
    console:
      enabled: true

server:
  port: 8080

# Configurações do RotaCusto
rotacusto:
  # Nominatim (geocoding do endereço final) + Photon (autocomplete, aceita
  # busca por prefixo — o Nominatim não aceita). Ambos sobre dados OSM.
  geocoding:
    base-url: https://nominatim.openstreetmap.org
    user-agent: "RotaCusto/0.1 (contato: duanjesus30@gmail.com)"
    photon-base-url: https://photon.komoot.io
  # OpenRouteService (roteamento). A chave gratuita fica SÓ no back-end.
  # Defina via variável de ambiente ORS_API_KEY (não versionar a chave).
  routing:
    base-url: https://api.openrouteservice.org
    api-key: ${ORS_API_KEY:}
  # Parâmetros default do cálculo de parada para lanche (usados na Fase 4).
  food-stop:
    interval-hours: 3.0
    average-cost: 25.0
  # Overpass API (OpenStreetMap ao vivo) — usado tanto para pedágios quanto
  # para postos de combustível.
  overpass:
    base-url: https://overpass-api.de/api/interpreter
  # Detecção de pedágios na rota. Combina o dataset curado (poucas praças,
  # coordenadas aproximadas de município — ver TollPlazaSeeder) com busca ao
  # vivo no OpenStreetMap via Overpass (cobertura nacional, coordenadas
  # precisas, mas sem tarifa real — por isso a tarifa-padrão abaixo).
  # osm-detection-radius-km é apertado de propósito: muitas praças no Brasil
  # cobram só um sentido (a cabine física só existe numa das pistas de uma
  # rodovia dividida). Um raio largo "atravessa" o canteiro central e conta o
  # pedágio da pista oposta também — ver TollService.
  tolls:
    curated-detection-radius-km: 5.0
    osm-detection-radius-km: 0.1
    default-tarifa-por-eixo: 5.50
    default-tarifa-moto: 4.00
  # Postos de combustível reais na rota (OpenStreetMap). O preço usado no
  # cálculo continua sendo a média que o usuário informa — não existe fonte
  # gratuita de preço por posto em tempo real no Brasil.
  fuel-stations:
    detection-radius-km: 0.3
  # Relatos de "veículo não encontrado no catálogo" (link no app). Vai pra
  # arquivo em vez do banco porque o H2 é só em memória (reseta a cada
  # restart) — ver VehicleReportService.
  vehicle-reports:
    file: vehicle-reports.log
