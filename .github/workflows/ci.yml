name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  backend:
    name: Backend – Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build com Maven Wrapper
        run: ./mvnw -B clean compile

      - name: Executar testes (JUnit + Mockito)
        run: ./mvnw -B test

  frontend:
    name: Frontend – Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'
          cache: true

      - name: Instalar dependências
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Testes
        run: flutter test

  ios:
    name: iOS – Build (sem assinatura)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'
          cache: true

      - name: Instalar dependências
        run: flutter pub get

      # Fase 7 — sem conta Apple Developer, não dá pra assinar nem publicar; este
      # build só prova que o código Dart e os plugins usados compilam de verdade
      # pro alvo iOS, sem acesso a Mac físico algum neste ambiente.
      - name: Build iOS (--no-codesign)
        run: flutter build ios --release --no-codesign
